version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: saturday
    reviewers:
      - yeongjonglim
    ignore:
      # Microsoft.OpenApi is pinned to v2 (see SluiceBase.Api.csproj): .NET 10's OpenAPI
      # stack targets v2, and v3 is a breaking change. Allow minor/patch bumps within v2
      # but block the v2 -> v3 major jump. Remove this ignore when moving to .NET 11,
      # which adopts Microsoft.OpenApi v3.
      - dependency-name: "Microsoft.OpenApi"
        update-types: ["version-update:semver-major"]
    groups:
      aspire:
        patterns:
          - "Aspire.*"
          - "CommunityToolkit.Aspire.*"
      microsoft:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
          - "Microsoft.EntityFrameworkCore*"
          - "EFCore.NamingConventions"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      testing:
        patterns:
          - "xunit.*"
          - "Testcontainers.*"
          - "Microsoft.NET.Test.Sdk"

  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
      day: saturday
    reviewers:
      - yeongjonglim
    ignore:
      # TypeScript is pinned to v5: openapi-typescript is not yet compatible with
      # TS v6, so the v5 -> v6 major jump breaks the openapi.json -> schema.ts
      # codegen. Allow minor/patch bumps within v5 but block the major. Remove this
      # ignore once openapi-typescript ships TS v6 support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      mantine:
        patterns:
          - "@mantine/*"
          - "postcss-preset-mantine"
      tanstack:
        patterns:
          - "@tanstack/*"
      codemirror:
        patterns:
          - "@codemirror/*"
          - "@uiw/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "@testing-library/*"
          - "@playwright/*"
          - "vitest"
          - "jsdom"
      build-tooling:
        patterns:
          - "eslint*"
          - "typescript*"
          - "vite"
          - "@vitejs/*"
          - "globals"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    reviewers:
      - yeongjonglim
    groups:
      actions:
        patterns:
          - "*"
